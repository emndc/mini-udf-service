# ═════════════════════════════════════════════════════════════════════
# Nginx Configuration for Mini UDF Service (Reverse Proxy + SSL)
# ═════════════════════════════════════════════════════════════════════
#
# SETUP:
# 1. Copy this to: /etc/nginx/sites-available/mini-udf-service
# 2. Update: YOUR_DOMAIN_HERE with your actual domain
# 3. Test: sudo nginx -t
# 4. Enable: sudo ln -s /etc/nginx/sites-available/mini-udf-service /etc/nginx/sites-enabled/
# 5. SSL: sudo certbot certonly --nginx -d yourdomain.com
# 6. Reload: sudo systemctl reload nginx
#

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE;

    location / {
        return 301 https://$server_name$request_uri;
    }

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# HTTPS with reverse proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN_HERE;

    # SSL Certificates (replace with your paths)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;

    # SSL Security (Mozilla recommended)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/mini-udf-service-access.log;
    error_log /var/log/nginx/mini-udf-service-error.log;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/m;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=200r/m;

    # Health check (no rate limit)
    location /health {
        limit_req off;
        proxy_pass http://127.0.0.1:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints (strict rate limiting)
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://127.0.0.1:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for large file uploads
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable buffering for file streaming
        proxy_buffering off;
    }

    # Other routes (general rate limiting)
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        proxy_pass http://127.0.0.1:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to .env file
    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to logs
    location ~ /logs/ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
